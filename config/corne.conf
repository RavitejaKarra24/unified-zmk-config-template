# Corne MX — Pro Micro nRF52840 (nice!nano v2 compatible)
# Battery: 500 mAh | Switches: Akko V3 Creamy Blue Pro

CONFIG_ZMK_KEYBOARD_NAME="Corne MX"

# ── Bluetooth ─────────────────────────────────────────────
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── USB ───────────────────────────────────────────────────
CONFIG_ZMK_USB=y

# ── Battery ───────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# ── Power Management ─────────────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Debounce (Akko V3 Creamy Blue Pro switches) ─────────
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# ══════════════════════════════════════════════════════════
# OLED Display — zmk-nice-oled module
# ══════════════════════════════════════════════════════════
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# ── Central (Left Half) ─────────────────────────────────
# WPM tracking with Bongo Cat animation
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT_ANIMATION_MS=200
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n

# Layer indicator
CONFIG_NICE_OLED_WIDGET_LAYER=y

# Modifier indicators with macOS symbols (⌘ ⌥ ⇧ ⌃)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_BOX=y

# HID indicators (CapsLock etc.)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y

# ── Peripheral (Right Half) ─────────────────────────────
# Animated cat + smart battery indicator
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y

# Show a sleep art image when keyboard goes idle
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y
