# Corne MX — Pro Micro nRF52840 (nice!nano v2 compatible)
# Battery: 500 mAh | Switches: Akko V3 Creamy Blue Pro

CONFIG_ZMK_KEYBOARD_NAME="Corne MX"

# ── Bluetooth ─────────────────────────────────────────────
# Max transmit power for better range across the split halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── USB ───────────────────────────────────────────────────
CONFIG_ZMK_USB=y

# ── Battery ───────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# ── Power Management ─────────────────────────────────────
# Deep sleep after 15 minutes of idle (saves battery significantly)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Debounce ─────────────────────────────────────────────
# 5ms debounce works well for Akko V3 mechanical switches
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
