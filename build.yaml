# ZMK build matrix for Corne MX with nice!nano v2 (Pro Micro nRF52840)
#
# Builds:
#   1. Left half  (central) - OLED + ZMK Studio support
#   2. Right half (peripheral) - OLED with cat animation
#   3. Settings reset - utility firmware to clear bond/pairing data
#
---
include:
  - board: nice_nano_v2
    shield: corne_left nice_oled
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: corne_right nice_oled
  - board: nice_nano_v2
    shield: settings_reset
