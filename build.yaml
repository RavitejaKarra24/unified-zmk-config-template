# ZMK build matrix for Corne MX with nice!nano v2 (Pro Micro nRF52840)
#
# Builds:
#   1. Left half  - with ZMK Studio support (live keymap editing over USB)
#   2. Right half - peripheral (connects to left over BLE)
#   3. Settings reset - utility firmware to clear bond/pairing data
#
---
include:
  - board: nice_nano_v2
    shield: corne_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: corne_right
  - board: nice_nano_v2
    shield: settings_reset
